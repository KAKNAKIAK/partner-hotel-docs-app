<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>거래처 인보이스·호텔 확정서 작성기</title>
    <style>
      body {
        margin: 0;
        font-family: "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
      }

      .boot-message {
        max-width: 560px;
        margin: 18vh auto 0;
        border: 1px solid #d9e0ea;
        border-radius: 12px;
        padding: 24px;
        color: #172033;
        background: #fff;
        box-shadow: 0 14px 32px rgba(15, 23, 42, 0.1);
      }

      .boot-message h1 {
        margin: 0 0 10px;
        font-size: 20px;
      }

      .boot-message p {
        margin: 8px 0;
        color: #667084;
        font-size: 14px;
        line-height: 1.6;
      }

      .boot-message code {
        border-radius: 6px;
        padding: 2px 6px;
        background: #eff6ff;
        color: #2563eb;
        font-family: Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-message">
        <h1>Vite 개발 서버가 필요합니다</h1>
        <p>이 화면은 React + Vite 앱이라 HTML 파일을 직접 열면 실행되지 않습니다.</p>
        <p>터미널에서 <code>npm run dev</code> 실행 후 표시되는 <code>http://127.0.0.1:포트</code> 주소로 열어 주세요.</p>
      </div>
    </div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
